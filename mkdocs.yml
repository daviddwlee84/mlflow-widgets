site_name: mlflow-widgets
site_description: Anywidget-based notebook widgets for MLflow experiment visualization
site_url: https://daviddwlee84.github.io/mlflow-widgets/
repo_url: https://github.com/daviddwlee84/mlflow-widgets
repo_name: daviddwlee84/mlflow-widgets
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_root_toc_entry: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            inherited_members: false
          inventories:
            - https://docs.python.org/3/objects.inv
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: >
        Anywidget-based notebook widgets for MLflow experiment visualization.
        Provides MlflowChart (live metric line chart), MlflowRunTable (sortable
        run table), MlflowParallelCoordinates (parallel coordinates chart), and
        MlflowRunSelector (DataFrame-based run picker). Works in Jupyter, Marimo,
        and any notebook supporting anywidget.
      sections:
        Guides:
          - index.md
          - installation.md
          - getting-started.md
        Widgets:
          - widgets/*.md
        Examples:
          - examples.md
        API Reference:
          - reference/*.md
        Changelog:
          - changelog.md
  - copy-to-llm:
      repo_url: "https://daviddwlee84.github.io/mlflow-widgets"
      button_hover_color: "var(--md-primary-fg-color)"
      toast_bg_color: "var(--md-primary-fg-color)"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Widgets:
      - MlflowChart: widgets/chart.md
      - MlflowRunTable: widgets/table.md
      - MlflowParallelCoordinates: widgets/parallel.md
      - MlflowRunSelector: widgets/selector.md
  - Examples: examples.md
  - API Reference:
      - Overview: reference/index.md
      - MlflowChart: reference/chart.md
      - MlflowRunTable: reference/table.md
      - MlflowParallelCoordinates: reference/parallel.md
      - MlflowRunSelector: reference/selector.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/daviddwlee84/mlflow-widgets
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mlflow-widgets/
